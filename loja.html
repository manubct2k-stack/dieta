<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="icon" type="image/png" href="Centro.png" />
  <title>Loja – Centro Comercial Massaka</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C8960C;
      --gold-light: #E4B83A;
      --gold-pale: #FDF3D8;
      --dark: #0B0B0B;
      --dark2: #141414;
      --dark3: #1E1E1E;
      --cream: #F7F3EC;
      --cream2: #EDE5D4;
      --cream3: #E0D5C0;
      --text: #1C1C1C;
      --muted: #888;
      --white: #FFFFFF;
      --green: #1A7A40;
      --red: #C0392B;
      --radius: 14px;
      --radius-lg: 22px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--dark2); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 99px; }

    /* ══════════════════════════════════════
       NAVBAR
    ══════════════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5vw;
      height: 68px;
      background: rgba(11,11,11,0.9);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border-bottom: 1px solid rgba(200,150,12,0.15);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem; font-weight: 600;
      color: var(--white); text-decoration: none; letter-spacing: 0.03em;
    }
    .nav-logo .accent { color: var(--gold); font-style: italic; }

    .nav-back {
      display: inline-flex; align-items: center; gap: 8px;
      text-decoration: none;
      font-size: 0.8rem; font-weight: 500; letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--gold); }
    .nav-back-arrow { font-size: 1rem; transition: transform 0.2s; }
    .nav-back:hover .nav-back-arrow { transform: translateX(-3px); }

    /* ══════════════════════════════════════
       HERO BANNER
    ══════════════════════════════════════ */
    .store-hero {
      margin-top: 68px;
      position: relative;
      height: 55vh; min-height: 380px;
      overflow: hidden;
      background: var(--dark2);
    }

    .store-hero-img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block;
      transition: transform 8s ease;
      transform: scale(1.05);
    }
    .store-hero-img.loaded { transform: scale(1); }

    .store-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(11,11,11,0.15) 0%,
        rgba(11,11,11,0.35) 50%,
        rgba(11,11,11,0.78) 100%
      );
    }

    .store-hero-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 3rem 5vw;
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 1.5rem;
    }

    .store-hero-meta { flex: 1; min-width: 260px; }

    .store-cat-badge {
      display: inline-block;
      background: var(--gold);
      color: var(--dark);
      padding: 5px 16px; border-radius: 99px;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 1rem;
      animation: fadeUp 0.5s ease both;
    }

    .store-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 600;
      color: var(--white);
      line-height: 1.05;
      margin-bottom: 0.8rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .store-hero-floor {
      font-size: 0.84rem; font-weight: 400;
      color: rgba(255,255,255,0.5);
      display: flex; align-items: center; gap: 10px;
      animation: fadeUp 0.5s 0.18s ease both;
    }
    .store-hero-floor span { color: rgba(255,255,255,0.25); }

    .store-status-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 22px; border-radius: 99px;
      font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em;
      animation: fadeUp 0.5s 0.22s ease both;
      flex-shrink: 0;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }
    .status-open  { background: rgba(26,122,64,0.18);  color: #4ADE80; border: 1px solid rgba(74,222,128,0.25); }
    .status-closed{ background: rgba(192,57,43,0.18);  color: #F87171; border: 1px solid rgba(248,113,113,0.25); }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      flex-shrink: 0;
    }
    .status-open  .status-dot { background: #4ADE80; animation: blink 2s ease-in-out infinite; }
    .status-closed .status-dot { background: #F87171; }

    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════════════
       MAIN CONTENT LAYOUT
    ══════════════════════════════════════ */
    .store-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 32px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 3.5rem 5vw 6rem;
      align-items: start;
    }

    /* ── LEFT COLUMN ── */
    .store-main { min-width: 0; }

    /* Section title inside content */
    .content-label {
      font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--gold); margin-bottom: 1rem;
      display: flex; align-items: center; gap: 10px;
    }
    .content-label::after {
      content: ''; flex: 1; height: 1px; background: var(--cream3);
    }

    /* About block */
    .store-about {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 2rem 2.2rem;
      margin-bottom: 24px;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .store-desc {
      font-size: 1rem; font-weight: 300; line-height: 1.85;
      color: #444;
    }

    /* Gallery */
    .store-gallery {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 2rem 2.2rem;
      margin-bottom: 24px;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-top: 0;
    }
    .gallery-item {
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 1;
      cursor: pointer;
      position: relative;
    }
    .gallery-item img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
      transition: transform 0.45s var(--transition);
    }
    .gallery-item:hover img { transform: scale(1.08); }
    .gallery-item::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(11,11,11,0);
      transition: background 0.3s;
    }
    .gallery-item:hover::after { background: rgba(11,11,11,0.18); }

    /* Highlights */
    .store-highlights {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 2rem 2.2rem;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .highlights-list {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; list-style: none;
    }
    .highlight-item {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--cream);
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1px solid var(--cream3);
      transition: border-color 0.2s, transform 0.2s;
    }
    .highlight-item:hover { border-color: var(--gold); transform: translateY(-1px); }
    .highlight-icon { font-size: 1.3rem; flex-shrink: 0; line-height: 1; }
    .highlight-text strong {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: var(--text); margin-bottom: 2px;
    }
    .highlight-text span { font-size: 0.76rem; font-weight: 300; color: var(--muted); }

    /* ── RIGHT COLUMN (SIDEBAR) ── */
    .store-sidebar { position: sticky; top: 92px; }

    .sidebar-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      overflow: hidden;
      margin-bottom: 18px;
    }

    .sidebar-card-header {
      background: var(--dark);
      padding: 1.5rem 1.8rem;
      display: flex; align-items: center; gap: 12px;
    }
    .sidebar-logo {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--dark3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .sidebar-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 600;
      color: var(--white);
    }
    .sidebar-cat {
      font-size: 0.72rem; font-weight: 500;
      color: var(--gold); letter-spacing: 0.06em;
    }

    .sidebar-card-body { padding: 1.5rem 1.8rem; }

    .info-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid var(--cream2);
    }
    .info-row:last-child { border-bottom: none; }
    .info-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
    .info-label {
      font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-bottom: 3px;
    }
    .info-value { font-size: 0.88rem; font-weight: 400; color: var(--text); line-height: 1.5; }
    .info-value a { color: var(--gold); text-decoration: none; }
    .info-value a:hover { text-decoration: underline; }

    /* Horário rows */
    .schedule-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.83rem; padding: 4px 0;
    }
    .schedule-day { font-weight: 400; color: var(--muted); }
    .schedule-time { font-weight: 500; color: var(--text); }
    .schedule-today { color: var(--gold); font-weight: 600; }

    /* CTA buttons */
    .sidebar-ctas {
      padding: 0 1.8rem 1.8rem;
      display: flex; flex-direction: column; gap: 10px;
    }
    .cta-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 20px; border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.86rem; font-weight: 600;
      text-decoration: none; cursor: pointer; border: none;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      letter-spacing: 0.03em;
    }
    .cta-primary {
      background: var(--gold); color: var(--dark);
    }
    .cta-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(200,150,12,0.32);
    }
    .cta-outline {
      background: transparent; color: var(--text);
      border: 1.5px solid var(--cream3);
    }
    .cta-outline:hover { border-color: var(--text); background: var(--cream); }

    /* ── BREADCRUMB ── */
    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      padding: 1.6rem 5vw 0;
      max-width: 1200px; margin: 0 auto;
      font-size: 0.78rem; font-weight: 400;
      color: var(--muted);
    }
    .breadcrumb a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb-sep { color: var(--cream3); }
    .breadcrumb-current { color: var(--text); font-weight: 500; }

    /* ── RELATED STORES ── */
    .related-section {
      background: var(--dark2);
      padding: 5rem 5vw;
    }
    .related-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .related-tag {
      font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--gold); display: block; margin-bottom: 0.7rem;
    }
    .related-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 600; color: var(--white);
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 18px;
      max-width: 1200px; margin: 0 auto;
    }

    .related-card {
      background: var(--dark3);
      border-radius: var(--radius-lg);
      overflow: hidden;
      text-decoration: none; color: inherit;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      display: block;
    }
    .related-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
      border-color: rgba(200,150,12,0.2);
    }
    .related-card-img-wrap { overflow: hidden; position: relative; }
    .related-card-img {
      width: 100%; aspect-ratio: 16/9; object-fit: cover;
      display: block;
      transition: transform 0.5s;
    }
    .related-card:hover .related-card-img { transform: scale(1.06); }
    .related-card-img-wrap::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(11,11,11,0.4) 0%, transparent 60%);
      pointer-events: none;
    }
    .related-card-body { padding: 18px; }
    .related-card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 600;
      color: var(--white); margin-bottom: 5px;
    }
    .related-card-cat {
      font-size: 0.74rem; font-weight: 500;
      color: var(--gold); letter-spacing: 0.06em; text-transform: uppercase;
    }
    .related-card-floor {
      font-size: 0.75rem; color: rgba(255,255,255,0.3);
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    /* ── FOOTER ── */
    footer {
      background: #060606;
      padding: 3rem 5vw 2rem;
    }
    .footer-bottom {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
      font-size: 0.78rem; font-weight: 300;
      color: rgba(255,255,255,0.2);
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 2rem;
    }
    .footer-bottom a {
      color: rgba(255,255,255,0.2); text-decoration: none; transition: color 0.2s;
    }
    .footer-bottom a:hover { color: var(--gold); }

    .footer-links {
      display: flex; gap: 2rem; flex-wrap: wrap;
      list-style: none;
      margin-bottom: 2rem;
      justify-content: center;
    }
    .footer-links a {
      font-size: 0.8rem; font-weight: 400;
      color: rgba(255,255,255,0.25);
      text-decoration: none; transition: color 0.2s;
      letter-spacing: 0.04em;
    }
    .footer-links a:hover { color: var(--gold); }

    /* ── NOT FOUND STATE ── */
    .not-found {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center;
      min-height: calc(100vh - 68px);
      padding: 4rem 5vw;
      text-align: center;
    }
    .not-found-icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.4; }
    .not-found h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 600;
      color: var(--text); margin-bottom: 0.7rem;
    }
    .not-found p { font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .store-layout { grid-template-columns: 1fr; }
      .store-sidebar { position: static; }
    }
    @media (max-width: 560px) {
      .highlights-list { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .store-hero { height: 45vh; }
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.92);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw; max-height: 85vh;
      border-radius: var(--radius);
      object-fit: contain;
      animation: lbIn 0.25s ease;
    }
    @keyframes lbIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 2rem;
      font-size: 2rem; color: rgba(255,255,255,0.5);
      cursor: pointer; transition: color 0.2s; line-height: 1;
      background: none; border: none;
    }
    .lightbox-close:hover { color: var(--white); }
  </style>
</head>

/* Today's day for schedule highlight */
const todayDayName = (() => {
  const d = new Date().getDay();
  if (d === 0) return 'Domingo';
  if (d === 6) return 'Sábado';
  return 'Segunda'; // Matches "Segunda - Sexta" and "Segunda - Sábado" logic visually
})();

/* ══════════════════════════════════════
   STATUS VERIFICATION LOGIC (REAL-TIME)
══════════════════════════════════════ */
function getStoreStatus(store) {
  const dayIndex = new Date().getDay(); // 0 = Dom, 1 = Seg ... 6 = Sab
  let todayTime = 'Fechado';

  // Find the right schedule line for today
  for (const s of store.schedule) {
    const dayText = s.day.toLowerCase();
    if (dayText.includes('domingo') && dayIndex === 0) todayTime = s.time;
    else if (dayText === 'sábado' && dayIndex === 6) todayTime = s.time;
    else if (dayText.includes('segunda') && dayText.includes('sexta') && dayIndex >= 1 && dayIndex <= 5) todayTime = s.time;
    else if (dayText.includes('segunda') && dayText.includes('sábado') && dayIndex >= 1 && dayIndex <= 6) todayTime = s.time;
  }

  // If closed today entirely
  if (todayTime.toLowerCase() === 'fechado') return false;

  // Split time string (e.g., "09:00 - 20:00" or "09:00 – 20:00")
  const parts = todayTime.split(/[-–]/).map(s => s.trim());
  if (parts.length !== 2) return false;

  const [openH, openM] = parts[0].split(':').map(Number);
  const [closeH, closeM] = parts[1].split(':').map(Number);

  const now = new Date();
  const currentTotalMinutes = now.getHours() * 60 + now.getMinutes();
  
  const openTotalMinutes = openH * 60 + openM;
  let closeTotalMinutes = closeH * 60 + closeM;

  // Handle stores closing past midnight
  if (closeTotalMinutes <= openTotalMinutes) {
    closeTotalMinutes += 24 * 60;
  }

  let adjustedCurrent = currentTotalMinutes;
  // If we are past midnight but before closing time of the previous day
  if (currentTotalMinutes < openTotalMinutes && closeTotalMinutes > 24 * 60) {
    adjustedCurrent += 24 * 60;
  }

  // Return true if current time is within boundaries
  return adjustedCurrent >= openTotalMinutes && adjustedCurrent < closeTotalMinutes;
}

/* ══════════════════════════════════════
   UPDATE STATUS EVERY MINUTE
══════════════════════════════════════ */
setInterval(() => {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'), 10);
  const store = STORES[id];
  
  if(store) {
    const isOpen = getStoreStatus(store);
    const pill = document.getElementById('dynamicStatusPill');
    const text = document.getElementById('dynamicStatusText');
    
    if (pill && text) {
      if (isOpen) {
        pill.classList.remove('status-closed');
        pill.classList.add('status-open');
        text.textContent = 'Aberto agora';
      } else {
        pill.classList.remove('status-open');
        pill.classList.add('status-closed');
        text.textContent = 'Fechado';
      }
    }
  }
}, 60000); // 60000 ms = 1 minute

/* ══════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════ */
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});
