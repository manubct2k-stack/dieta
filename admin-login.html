<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login Administração | Massaka</title>
    <link rel="stylesheet" href="css/style.css"> 
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background: #0b0b0b; color: white; }
        .login-box { background: #141414; padding: 40px; border-radius: 20px; text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #C8960C; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Massaka</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

        // Configuração correta e limpa
        const firebaseConfig = {
            apiKey: "AIzaSyBEP8U8TqQIyYCo8csr_krFV-LdRy-l3sM",
            authDomain: "massaka-admin.firebaseapp.com",
            projectId: "massaka-admin",
            storageBucket: "massaka-admin.firebasestorage.app",
            messagingSenderId: "485883674077",
            appId: "1:485883674077:web:0113a94271b200d09bca34",
            measurementId: "G-5QQE1VYZDQ"
        };

        const app = initializeApp(firebaseConfig);

        window.login = () => {
            const auth = getAuth();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    window.location.href = "admin-dashboard.html";
                })
                .catch((error) => {
                    alert("Acesso negado! Verifique as credenciais.");
                    console.log(error);
                });
        }
    </script>
</body>
</html>
