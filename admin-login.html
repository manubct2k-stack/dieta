<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Acesso Restrito — Centro Comercial Massaka</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --gold: #C8960C; --gold-light: #E4B83A; --gold-pale: rgba(200,150,12,0.08); --dark: #060606; --dark2: #0C0C0C; --dark3: #141414; --dark4: #1C1C1C; --border: rgba(255,255,255,0.07); --border-gold: rgba(200,150,12,0.25); --text: #F5F0E8; --muted: rgba(245,240,232,0.4); --t: 0.3s cubic-bezier(0.4,0,0.2,1); }
        html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--dark); color: var(--text); overflow: hidden; }
        .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 15% 50%, rgba(200,150,12,0.06) 0%, transparent 60%), var(--dark); }
        .page { position: relative; z-index: 1; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .left-panel { display: none; flex-direction: column; justify-content: flex-end; width: 420px; padding: 3rem 3.5rem; height: 100vh; position: fixed; left: 0; top: 0; }
        @media (min-width: 1000px) { .left-panel { display: flex; } .page { padding-left: 460px; } }
        .login-wrap { width: 100%; max-width: 420px; }
        .login-card { background: var(--dark3); border: 1px solid var(--border); border-radius: 24px; padding: 2.8rem 2.6rem; position: relative; overflow: hidden; }
        .login-title { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .login-title span { color: var(--gold); font-style: italic; }
        .field { margin-bottom: 1.2rem; }
        .field-label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
        .field-input { width: 100%; padding: 13px 42px; background: var(--dark4); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); outline: none; }
        .btn-login { width: 100%; padding: 14px; background: var(--gold); color: #060606; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .error-box { display: none; padding: 12px; background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; color: #FCA5A5; margin-bottom: 1.2rem; }
        .error-box.show { display: flex; }
        .success-overlay { display: none; position: absolute; inset: 0; background: var(--dark3); border-radius: 24px; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .success-overlay.show { display: flex; }
        .btn-spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; }
        .btn-login.loading .btn-spinner { display: block; }
        @keyframes spin { to{transform:rotate(360deg);} }
    </style>
</head>
<body>

<div class="bg"></div>

<div class="left-panel">
  <div class="left-brand">
    <div class="left-brand-name">Centro Comercial <span>Massaka</span></div>
    <div class="left-brand-sub">Painel de Administração</div>
  </div>
</div>

<div class="page">
  <div class="login-wrap">
    <div class="login-card" id="loginCard">
      <div class="success-overlay" id="successOverlay">
        <div class="success-title">Bem-vindo!</div>
        <div class="success-sub" id="successName">A carregar o painel...</div>
      </div>
      <div class="login-title">Iniciar <span>Sessão</span></div>
      <div class="error-box" id="errorBox">
        <span id="errorMsg">Credenciais inválidas.</span>
      </div>
      <div class="field">
        <label class="field-label">Endereço de Email</label>
        <input class="field-input" type="email" id="emailInput" placeholder="admin@massaka.co.mz" />
      </div>
      <div class="field">
        <label class="field-label">Palavra-passe</label>
        <input class="field-input" type="password" id="passInput" placeholder="••••••••••" onkeydown="if(event.key==='Enter')tentarLogin()" />
      </div>
      <button class="btn-login" id="loginBtn" onclick="tentarLogin()">
        <span class="btn-text">Entrar no Painel →</span>
        <div class="btn-spinner"></div>
      </button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEP8U8TqQIyYCo8csr_krFV-LdRy-l3sM",
  authDomain: "massaka-admin.firebaseapp.com",
  projectId: "massaka-admin",
  storageBucket: "massaka-admin.firebasestorage.app",
  messagingSenderId: "485883674077",
  appId: "1:485883674077:web:0113a94271b200d09bca34"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async user => {
  if (user) {
    try {
      const snap = await getDoc(doc(db, 'utilizadores', user.uid));
      if (snap.exists() && snap.data().active !== false) {
        window.location.href = 'https://dieta-black.vercel.app/admin-dashboard.html';
      }
    } catch(e) {}
  }
});

window.tentarLogin = async () => {
  const email = document.getElementById('emailInput').value.trim();
  const pass = document.getElementById('passInput').value;
  const btn = document.getElementById('loginBtn');
  const errBox = document.getElementById('errorBox');

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const snap = await getDoc(doc(db, 'utilizadores', cred.user.uid));

    if (!snap.exists() || snap.data().active === false) {
        throw new Error("Acesso negado");
    }

    document.getElementById('successName').textContent = "A redirecionar...";
    document.getElementById('successOverlay').classList.add('show');

    setTimeout(() => { 
        window.location.href = 'https://dieta-black.vercel.app/admin-dashboard.html'; 
    }, 1500);

  } catch(e) {
    btn.classList.remove('loading');
    btn.disabled = false;
    document.getElementById('errorMsg').textContent = "Credenciais inválidas ou conta desativada.";
    errBox.classList.add('show');
  }
};
</script>
</body>
</html>
