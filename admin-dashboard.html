<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin | Massaka</title>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: white; padding: 20px; }
        .card { background: #141414; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px; cursor: pointer; background: #C8960C; border: none; color: white; font-weight: bold; }
        .loja-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <h1>Painel de Administração</h1>

    <div class="card">
        <h2>Modo de Manutenção</h2>
        <button onclick="toggleManutencao()">Ativar/Desativar Manutenção</button>
    </div>

    <div class="card">
        <h2>Adicionar Nova Loja</h2>
        <input type="text" id="nomeLoja" placeholder="Nome da Loja">
        <button onclick="adicionarLoja()">Adicionar</button>
    </div>

    <div class="card">
        <h2>Gestão de Lojas</h2>
        <div id="listaLojas">Carregando lojas...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, addDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        // --- COLA AQUI A TUA FIREBASE CONFIG ---
        const firebaseConfig = {
              apiKey: "AIzaSyBEP8U8TqQIyYCo8csr_krFV-LdRy-l3sM",
  authDomain: "massaka-admin.firebaseapp.com",
  projectId: "massaka-admin",
  storageBucket: "massaka-admin.firebasestorage.app",
  messagingSenderId: "485883674077",
  appId: "1:485883674077:web:0113a94271b200d09bca34",
  measurementId: "G-5QQE1VYZDQ"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore();
        const auth = getAuth();

        // 1. Proteção de Login
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "admin-login.html";
        });

        // 2. Adicionar Loja
        window.adicionarLoja = async () => {
            const nome = document.getElementById("nomeLoja").value;
            if(!nome) return alert("Nome inválido!");
            await addDoc(collection(db, "lojas"), { name: nome });
            await addDoc(collection(db, "logs"), { acao: "Loja criada", alvo: nome, data: new Date().toISOString() });
            location.reload();
        }

        // 3. Apagar Loja
        window.apagarLoja = async (lojaId, nome) => {
            if(!confirm("Apagar " + nome + "?")) return;
            await deleteDoc(doc(db, "lojas", lojaId));
            await addDoc(collection(db, "logs"), { acao: "Loja apagada", alvo: nome, data: new Date().toISOString() });
            location.reload();
        }

        // 4. Alternar Manutenção
        window.toggleManutencao = async () => {
            const docRef = doc(db, "config", "site");
            const snap = await getDoc(docRef);
            const atual = snap.exists() ? snap.data().emManutencao : false;
            await updateDoc(docRef, { emManutencao: !atual });
            alert("Modo manutenção agora está: " + !atual);
        }

        // 5. Carregar Lojas
        async function carregarLojas() {
            const snap = await getDocs(collection(db, "lojas"));
            let html = "";
            snap.forEach(d => {
                const l = d.data();
                html += `<div class="loja-item"><span>${l.name}</span> <button onclick="apagarLoja('${d.id}', '${l.name}')">Apagar</button></div>`;
            });
            document.getElementById("listaLojas").innerHTML = html || "Nenhuma loja encontrada.";
        }
        carregarLojas();
    </script>
</body>
</html>
